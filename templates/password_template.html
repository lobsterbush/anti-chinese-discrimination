<!DOCTYPE html>
<html class="staticrypt-html">

        <title>/*[|template_title|]*/0</title>

        <meta http-equiv="cache-control" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />

            rel="stylesheet"
        />

        <style>
            :root {
                --accent: #0c7592;
                --crimson: #b91c3c;
                --text: #f1f5f9;
                --text-muted: rgba(241, 245, 249, 0.72);
                --card-bg: rgba(15, 23, 42, 0.55);
                --card-border: rgba(241, 245, 249, 0.12);
                --input-bg: rgba(15, 23, 42, 0.55);
                --input-border: rgba(241, 245, 249, 0.18);
            }

            .staticrypt-html,
            .staticrypt-body {
                height: 100%;
            }

            .staticrypt-body {
                margin: 0;
                font-family: "Space Grotesk", system-ui, sans-serif;
                color: var(--text);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            /* Hero (art-aurora) background from slides.html */
            .staticrypt-content {
                position: relative;
                min-height: 100%;
                margin-bottom: 0;
                background:
                    radial-gradient(ellipse 120% 60% at 10% 90%, rgba(12, 117, 146, 0.18) 0%, transparent 50%),
                    radial-gradient(ellipse 100% 50% at 90% 10%, rgba(185, 28, 60, 0.14) 0%, transparent 50%),
                    radial-gradient(ellipse 80% 80% at 50% 50%, rgba(12, 117, 146, 0.06) 0%, transparent 60%),
                    linear-gradient(160deg, #050810 0%, #0a1628 40%, #0d1219 100%);
                font-family: "Space Grotesk", system-ui, sans-serif;
            }

            .staticrypt-page {
                width: min(420px, 92vw);
                padding: 12vh 0 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: var(--card-bg);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid var(--card-border);
                border-radius: 14px;
                margin: 0 auto 100px;
                padding: 44px 38px 36px;
                text-align: center;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45), 0 1px 0 rgba(255, 255, 255, 0.04) inset;
            }

            .staticrypt-instructions {
                margin: 0 0 1.4em;
            }

            .staticrypt-title {
                font-size: 1.5em;
                font-weight: 700;
                letter-spacing: -0.01em;
                margin: 0 0 0.25em;
                background: linear-gradient(120deg, var(--accent), var(--crimson));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            .staticrypt-instructions p:not(.staticrypt-title) {
                font-family: "IBM Plex Mono", monospace;
                font-size: 0.72em;
                font-weight: 500;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--text-muted);
                margin: 0;
            }

            .staticrypt-hr {
                margin: 18px auto 22px;
                border: 0;
                border-top: 1px solid var(--card-border);
                width: 40%;
            }

            .staticrypt-password-container {
                position: relative;
                background: var(--input-bg);
                border: 1px solid var(--input-border);
                border-radius: 8px;
                width: 100%;
                margin: 0 0 16px;
                box-sizing: border-box;
                transition: border-color 0.2s ease, box-shadow 0.2s ease;
            }

            .staticrypt-password-container:focus-within {
                border-color: rgba(12, 117, 146, 0.8);
                box-shadow: 0 0 0 3px rgba(12, 117, 146, 0.18);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                color: var(--text);
                box-sizing: border-box;
                font-family: "Space Grotesk", system-ui, sans-serif;
                font-size: 15px;
                outline: 0;
                padding: 14px 42px 14px 16px;
                width: 100%;
            }

            .staticrypt-form input::placeholder {
                color: rgba(241, 245, 249, 0.4);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                opacity: 0.55;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                filter: invert(1);
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.85;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                font-family: "IBM Plex Mono", monospace;
                text-transform: uppercase;
                letter-spacing: 0.14em;
                outline: 0;
                background: linear-gradient(120deg, var(--accent), var(--crimson));
                width: 100%;
                border: 0;
                border-radius: 8px;
                padding: 14px;
                color: #ffffff;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                transition: filter 0.2s ease, transform 0.2s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                filter: brightness(110%);
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: translateY(1px);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 12px 0 4px;
                color: var(--text-muted);
                font-size: 0.85em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.2);
                margin-right: 0.8em;
                accent-color: var(--accent);
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid rgba(241, 245, 249, 0.25);
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

                </div>
            </div>
        </div>

                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",

                clearLocalStorageCallback: null,

            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            // try to automatically decrypt on load if there is a saved password

                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

                if (!isSuccessful) {
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");

                    passwordInput.type = "text";
                    toggleIcon.src = imgSrcEyeOpened;
                    toggleIcon.alt = templateToggleAltHide;
                    toggleIcon.title = templateToggleAltHide;
                } else {
                    passwordInput.type = "password";
                    toggleIcon.src = imgSrcEyeClosed;
                    toggleIcon.alt = templateToggleAltShow;
                    toggleIcon.title = templateToggleAltShow;

            // handle password form submission
            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();

                const password = document.getElementById("staticrypt-password").value,
                    isRememberChecked = document.getElementById("staticrypt-remember").checked;

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

                if (!isSuccessful) {
                    alert(templateError);

            });
